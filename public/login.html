<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — zacharialentz.com</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#0b0f19; color:#e5e7eb; display:grid; place-items:center; height:100vh; margin:0; }
      form { background:#131a2a; border:1px solid #24304a; border-radius:12px; padding:1rem; width:min(360px,90vw); display:grid; gap:.75rem; }
      input { width:100%; padding:.6rem; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#e5e7eb; }
      button { padding:.65rem; border:0; border-radius:8px; background:#2563eb; color:white; cursor:pointer; }
      small { opacity:.75; }
    </style>
  </head>
  <body>
    <form method="post" action="/api/auth/login">
      <h1>Sign in</h1>
      <label>Username<input name="username" autocomplete="username" required /></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
      <button type="submit">Continue</button>
      <small>Private projects portal</small>
    </form>
  </body>
</html>
